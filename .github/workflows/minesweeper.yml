name: Minesweeper

on:
  issues:
    types: [opened]

concurrency:
  group: minesweeper
  cancel-in-progress: false

jobs:
  play:
    if: |
      contains(github.event.issue.labels.*.name, 'minesweeper') &&
      (
        startsWith(github.event.issue.title, 'minesweeper reveal') ||
        startsWith(github.event.issue.title, 'minesweeper flag') ||
        startsWith(github.event.issue.title, 'minesweeper new')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process move
        run: python game/minesweeper.py "${{ github.event.issue.title }}"

      - name: Commit and push updated board
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game/state.json
          git diff --staged --quiet || git commit -m "🎮 Minesweeper: update board [skip ci]"
          git pull --rebase origin main
          git push

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Move processed! [View the updated board](https://github.com/PiragashSelvaratnam/PiragashSelvaratnam#-minesweeper)"
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
